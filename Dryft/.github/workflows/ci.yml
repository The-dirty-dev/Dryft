name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rebrand-guard:
    name: Rebrand Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for stale rebrand references
        run: |
          set -euo pipefail
          if grep -R -nE 'api\.drift\.|drift-backend|drift://|drift_tokens|drift-auth|drift:api-error|com\.drift\.' \
            backend web mobile desktop shared docs .github \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude='CHANGELOG.md' \
            --exclude='AGENTS_COLLAB.md'; then
            echo "Found stale Drift references that should be Dryft."
            exit 1
          fi

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: rebrand-guard
    defaults:
      run:
        working-directory: backend/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Test
        run: go test ./...

  web:
    name: Web
    runs-on: ubuntu-latest
    needs: rebrand-guard
    defaults:
      run:
        working-directory: web/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    needs: rebrand-guard
    defaults:
      run:
        working-directory: mobile/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck
