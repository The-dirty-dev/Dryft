name: Nightly

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Nightly
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Test
        run: go test ./...

  web:
    name: Web Nightly
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  dryft-api-health:
    name: Dryft API Health
    runs-on: ubuntu-latest
    env:
      NIGHTLY_HEALTHCHECK_URL: ${{ vars.NIGHTLY_HEALTHCHECK_URL != '' && vars.NIGHTLY_HEALTHCHECK_URL || 'https://api.dryft.site/health' }}

    steps:
      - name: Check health endpoint
        run: curl -fsS "$NIGHTLY_HEALTHCHECK_URL"
