name: Deploy Staging

on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging
    env:
      STAGING_HEALTHCHECK_URL: ${{ vars.STAGING_HEALTHCHECK_URL != '' && vars.STAGING_HEALTHCHECK_URL || 'https://api.dryft.site/health' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy backend image
        run: |
          echo "Deploy dryft-backend:${{ github.event.workflow_run.head_sha }} to staging"
          # Configure your deployment target here.
          # Example: kubectl set image deployment/dryft-api dryft-api=$REGISTRY_URL/dryft-backend:${{ github.event.workflow_run.head_sha }} -n staging

      - name: Staging smoke test
        run: curl -fsS "$STAGING_HEALTHCHECK_URL"
