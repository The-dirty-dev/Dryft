# NOTE: This file is intended to be included from the nginx http {} block.
# It defines rate limiting zones and two server blocks (80 -> 443 redirect + TLS).

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Basic rate limiting (tune as needed)
limit_req_zone $binary_remote_addr zone=api_rate:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

upstream dryft_api {
  server 127.0.0.1:8080;
}

server {
  listen 80;
  server_name api.dryft.site;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.dryft.site;

  # Let's Encrypt certificate paths
  ssl_certificate /etc/letsencrypt/live/api.dryft.site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.dryft.site/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  # OCSP stapling (optional, requires resolver)
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 1.1.1.1 1.0.0.1 valid=300s;
  resolver_timeout 5s;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(self), microphone=(self), camera=(self)" always;

  location / {
    limit_req zone=api_rate burst=30 nodelay;
    limit_conn api_conn 20;

    proxy_pass http://dryft_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 120s;
  }
}
