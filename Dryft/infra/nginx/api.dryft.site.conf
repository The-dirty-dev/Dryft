# Nginx reverse proxy for api.dryft.site on DreamCompute.
# - Redirect HTTP to HTTPS
# - Terminate TLS with Let's Encrypt
# - Proxy API + WebSocket traffic to dryft-api on localhost:8080

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name api.dryft.site;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.dryft.site;

  ssl_certificate /etc/letsencrypt/live/api.dryft.site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.dryft.site/privkey.pem;

  access_log /var/log/nginx/api.dryft.site.access.log;
  error_log /var/log/nginx/api.dryft.site.error.log warn;

  # Backend limit is 10 MB; keep proxy in sync.
  client_max_body_size 10m;

  # Security headers.
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;

    # WebSocket support.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Forwarding headers.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts (longer read/send for WebSocket sessions).
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}

