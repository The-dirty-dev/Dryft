global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
      receiver: slack-critical
    - matchers:
        - severity="warning"
      receiver: slack-warning

receivers:
  - name: default
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#dryft-prod-alerts'
        send_resolved: true
        title: '[DRIFT][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |
          *Status:* {{ .Status | toUpper }}
          *Severity:* {{ .CommonLabels.severity }}
          *Instance:* {{ .CommonLabels.instance }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}

  - name: slack-critical
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#dryft-prod-alerts'
        send_resolved: true
        title: ':rotating_light: [DRIFT][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |
          *Status:* {{ .Status | toUpper }}
          *Severity:* {{ .CommonLabels.severity }}
          *Instance:* {{ .CommonLabels.instance }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}

  - name: slack-warning
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#dryft-prod-alerts'
        send_resolved: true
        title: ':warning: [DRIFT][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |
          *Status:* {{ .Status | toUpper }}
          *Severity:* {{ .CommonLabels.severity }}
          *Instance:* {{ .CommonLabels.instance }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
