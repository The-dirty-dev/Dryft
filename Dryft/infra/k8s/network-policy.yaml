apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dryft-api-netpol
  namespace: dryft
spec:
  podSelector:
    matchLabels:
      app: dryft-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: dryft-postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: dryft-redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS egress (external APIs: Stripe, Firebase, S3, etc.)
    - to: []
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dryft-postgres-netpol
  namespace: dryft
spec:
  podSelector:
    matchLabels:
      app: dryft-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dryft-api
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dryft-redis-netpol
  namespace: dryft
spec:
  podSelector:
    matchLabels:
      app: dryft-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dryft-api
      ports:
        - protocol: TCP
          port: 6379
