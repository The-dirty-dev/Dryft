openapi: 3.0.3
info:
  title: Drift API
  description: Backend API for the Drift social/dating application.
  version: 1.0.0
  contact:
    name: Drift Team

servers:
  - url: https://api.drift.app
    description: Production
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
    description: Service health checks
  - name: Auth
    description: Authentication and user profile
  - name: Age Verification
    description: Age gate / identity verification
  - name: Discovery
    description: Profile discovery and swiping
  - name: Matches
    description: Match management
  - name: Chat
    description: Conversations and messages
  - name: Notifications
    description: Push notifications and device registration
  - name: Calls
    description: Voice/video call signaling
  - name: Haptic
    description: Haptic device management and commands
  - name: Sessions
    description: Companion sessions
  - name: Store
    description: Marketplace store items
  - name: Inventory
    description: User inventory and equipped items
  - name: Creators
    description: Creator accounts and earnings
  - name: Webhooks
    description: External service webhooks
  - name: Admin
    description: Admin dashboard and moderation
  - name: WebSocket
    description: Real-time WebSocket connection

security:
  - BearerAuth: []

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      description: Basic health check to verify the service is running. Used for liveness probes.
      security: []
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  database:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: v1
        "503":
          description: Service is degraded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: degraded
                  database:
                    type: string
                    example: unreachable

  /ready:
    get:
      tags: [Health]
      summary: Readiness check
      description: Checks if the service is ready to accept traffic. Verifies database and Redis connectivity. Used for Kubernetes readiness probes.
      security: []
      operationId: getReady
      responses:
        "200":
          description: Service is ready to accept traffic
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
                    example: true
                  checks:
                    type: object
                    properties:
                      database:
                        type: string
                        example: ok
                      redis:
                        type: string
                        example: ok
                  timestamp:
                    type: string
                    format: date-time
        "503":
          description: Service is not ready - one or more dependencies unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
                    example: false
                  checks:
                    type: object
                    properties:
                      database:
                        type: string
                        example: unreachable
                      redis:
                        type: string
                        example: ok
                  timestamp:
                    type: string
                    format: date-time

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------
  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      security: []
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already registered

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid refresh token

  /v1/users/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getCurrentUser
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Auth]
      summary: Update current user profile
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                bio:
                  type: string
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Age Verification
  # ---------------------------------------------------------------------------
  /v1/age-gate/card/initiate:
    post:
      tags: [Age Verification]
      summary: Initiate card-based age verification via Stripe
      operationId: initiateCardVerification
      responses:
        "200":
          description: Client secret for Stripe SetupIntent
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_secret:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/age-gate/card/confirm:
    post:
      tags: [Age Verification]
      summary: Confirm card verification
      operationId: confirmCardVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [setup_intent_id]
              properties:
                setup_intent_id:
                  type: string
      responses:
        "200":
          description: Verification confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/age-gate/id/initiate:
    post:
      tags: [Age Verification]
      summary: Initiate ID-based age verification via Jumio
      operationId: initiateIDVerification
      responses:
        "200":
          description: Redirect URL or SDK token for Jumio
          content:
            application/json:
              schema:
                type: object
                properties:
                  redirect_url:
                    type: string
                  sdk_token:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/age-gate/id/webhook:
    post:
      tags: [Webhooks]
      summary: Jumio webhook for ID verification results
      security: []
      operationId: handleJumioWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /v1/age-gate/status:
    get:
      tags: [Age Verification]
      summary: Get current verification status
      operationId: getVerificationStatus
      responses:
        "200":
          description: Verification status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/age-gate/retry:
    post:
      tags: [Age Verification]
      summary: Retry a failed verification
      operationId: retryVerification
      responses:
        "200":
          description: Retry initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Discovery
  # ---------------------------------------------------------------------------
  /v1/discover:
    get:
      tags: [Discovery]
      summary: Get discoverable profiles
      operationId: getDiscoverProfiles
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of discoverable profiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      $ref: "#/components/schemas/DiscoverProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/discover/swipe:
    post:
      tags: [Discovery]
      summary: Swipe on a profile
      operationId: swipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwipeRequest"
      responses:
        "200":
          description: Swipe result (may include match)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwipeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Matches
  # ---------------------------------------------------------------------------
  /v1/matches:
    get:
      tags: [Matches]
      summary: Get user matches
      operationId: getMatches
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: List of matches
          content:
            application/json:
              schema:
                type: object
                properties:
                  matches:
                    type: array
                    items:
                      $ref: "#/components/schemas/MatchWithUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/matches/{matchID}:
    get:
      tags: [Matches]
      summary: Get a specific match
      operationId: getMatch
      parameters:
        - name: matchID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Match details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchWithUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Matches]
      summary: Unmatch a user
      operationId: unmatch
      parameters:
        - name: matchID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Unmatched successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/matches/{matchID}/conversation:
    get:
      tags: [Chat]
      summary: Get conversation for a match
      operationId: getConversationByMatch
      parameters:
        - name: matchID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Conversation for this match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Chat
  # ---------------------------------------------------------------------------
  /v1/conversations:
    get:
      tags: [Chat]
      summary: Get conversations
      operationId: getConversations
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConversationPreview"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/conversations/{conversationID}:
    get:
      tags: [Chat]
      summary: Get a specific conversation
      operationId: getConversation
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/conversations/{conversationID}/messages:
    get:
      tags: [Chat]
      summary: Get messages in a conversation
      operationId: getMessages
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Chat]
      summary: Send a message
      operationId: sendMessage
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/conversations/{conversationID}/read:
    post:
      tags: [Chat]
      summary: Mark conversation as read
      operationId: markConversationAsRead
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Marked as read
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Notifications
  # ---------------------------------------------------------------------------
  /v1/notifications/devices:
    post:
      tags: [Notifications]
      summary: Register a push notification device
      operationId: registerDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDeviceRequest"
      responses:
        "200":
          description: Device registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  device_id:
                    type: string
                  status:
                    type: string

  /v1/notifications/devices/{deviceId}:
    delete:
      tags: [Notifications]
      summary: Unregister a push notification device
      operationId: unregisterDevice
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Device unregistered

  /v1/notifications/voip-devices:
    post:
      tags: [Notifications]
      summary: Register a VoIP push device
      operationId: registerVoIPDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterVoIPDeviceRequest"
      responses:
        "200":
          description: VoIP device registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  device_id:
                    type: string
                  status:
                    type: string
    delete:
      tags: [Notifications]
      summary: Unregister a VoIP push device
      operationId: unregisterVoIPDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "204":
          description: VoIP device unregistered

  /v1/notifications:
    get:
      tags: [Notifications]
      summary: Get notifications
      operationId: getNotifications
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notification"
                  unread_count:
                    type: integer

  /v1/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get unread notification count
      operationId: getUnreadCount
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /v1/notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Mark a notification as read
      operationId: markNotificationRead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Notification marked as read

  /v1/notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      operationId: markAllNotificationsRead
      responses:
        "204":
          description: All notifications marked as read

  # ---------------------------------------------------------------------------
  # WebSocket
  # ---------------------------------------------------------------------------
  /v1/ws:
    get:
      tags: [WebSocket]
      summary: Connect to real-time WebSocket
      operationId: connectWebSocket
      description: >
        Upgrades to a WebSocket connection for real-time events including
        presence updates, new messages, match notifications, call signaling,
        and haptic commands. Pass the auth token as a query parameter.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Bearer token for authentication
      responses:
        "101":
          description: WebSocket upgrade
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Calls
  # ---------------------------------------------------------------------------
  /v1/calls/ws:
    get:
      tags: [Calls]
      summary: Connect to calls WebSocket for signaling
      operationId: connectCallsWebSocket
      description: WebSocket connection for WebRTC signaling (SDP offers/answers, ICE candidates).
      responses:
        "101":
          description: WebSocket upgrade
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/calls/initiate:
    post:
      tags: [Calls]
      summary: Initiate a call
      operationId: initiateCall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [match_id]
              properties:
                match_id:
                  type: string
                  format: uuid
                video_enabled:
                  type: boolean
                  default: false
      responses:
        "201":
          description: Call initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  call_id:
                    type: string
                    format: uuid
                  match_id:
                    type: string
                    format: uuid
                  callee_id:
                    type: string
                    format: uuid
                  video_enabled:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not part of this match

  /v1/calls/history:
    get:
      tags: [Calls]
      summary: Get call history
      operationId: getCallHistory
      responses:
        "200":
          description: Call history
          content:
            application/json:
              schema:
                type: object
                properties:
                  calls:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActiveCall"

  /v1/calls/active:
    get:
      tags: [Calls]
      summary: Get current active call
      operationId: getActiveCall
      responses:
        "200":
          description: Active call status
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  call:
                    $ref: "#/components/schemas/ActiveCall"

  /v1/calls/{id}/end:
    post:
      tags: [Calls]
      summary: End a call
      operationId: endCall
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Call ended
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ended

  # ---------------------------------------------------------------------------
  # Haptic Devices
  # ---------------------------------------------------------------------------
  /v1/haptic/devices:
    post:
      tags: [Haptic]
      summary: Register a haptic device
      operationId: registerHapticDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HapticDeviceRequest"
      responses:
        "201":
          description: Device registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HapticDevice"
    get:
      tags: [Haptic]
      summary: Get user's haptic devices
      operationId: getHapticDevices
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      $ref: "#/components/schemas/HapticDevice"

  /v1/haptic/devices/{deviceId}:
    get:
      tags: [Haptic]
      summary: Get a specific haptic device
      operationId: getHapticDevice
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Device details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HapticDevice"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Haptic]
      summary: Update a haptic device
      operationId: updateHapticDevice
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                max_intensity:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
      responses:
        "200":
          description: Device updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HapticDevice"
    delete:
      tags: [Haptic]
      summary: Delete a haptic device
      operationId: deleteHapticDevice
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Device deleted

  /v1/haptic/permissions:
    post:
      tags: [Haptic]
      summary: Set haptic permission for a match
      operationId: setHapticPermission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetHapticPermissionRequest"
      responses:
        "200":
          description: Permission set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HapticPermission"
    delete:
      tags: [Haptic]
      summary: Revoke haptic permission
      operationId: revokeHapticPermission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [controller_id, match_id]
              properties:
                controller_id:
                  type: string
                  format: uuid
                match_id:
                  type: string
                  format: uuid
      responses:
        "204":
          description: Permission revoked

  /v1/haptic/permissions/match/{matchId}:
    get:
      tags: [Haptic]
      summary: Get haptic permissions for a match
      operationId: getMatchHapticPermissions
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Permissions for this match
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions:
                    type: array
                    items:
                      $ref: "#/components/schemas/HapticPermission"

  /v1/haptic/command:
    post:
      tags: [Haptic]
      summary: Send a haptic command
      operationId: sendHapticCommand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HapticCommand"
      responses:
        "200":
          description: Command sent
          content:
            application/json:
              schema:
                type: object
