                  new_users:
                    type: integer
                  active_users:
                    type: integer
                  total_matches:
                    type: integer
                  total_messages:
                    type: integer
                  revenue:
                    type: integer

  /v1/admin/analytics/daily:
    get:
      tags: [Admin]
      summary: Get daily metrics
      operationId: getDailyMetrics
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics:
                    type: array
                    items:
                      $ref: "#/components/schemas/DailyMetrics"

  /v1/admin/analytics/cohorts:
    get:
      tags: [Admin]
      summary: Get cohort analysis
      operationId: getCohortAnalysis
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, monthly]
            default: weekly
      responses:
        "200":
          description: Cohort analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  cohorts:
                    type: array
                    items:
                      type: object

  /v1/admin/analytics/retention:
    get:
      tags: [Admin]
      summary: Get retention metrics
      operationId: getRetentionMetrics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 14d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Retention metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  day_1:
                    type: number
                    format: float
                  day_7:
                    type: number
                    format: float
                  day_14:
                    type: number
                    format: float
                  day_30:
                    type: number
                    format: float

  # ---------------------------------------------------------------------------
  # Prometheus Metrics
  # ---------------------------------------------------------------------------
  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics endpoint
      security: []
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    RegisterRequest:
      type: object
      required: [email, password, display_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        display_name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time

    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: integer
          format: int64
          description: Unix timestamp when access token expires
      required:
        - access_token
        - refresh_token
        - expires_at

    AuthResponse:
      type: object
      properties:
        tokens:
          $ref: "#/components/schemas/AuthTokens"
        user:
          $ref: "#/components/schemas/User"
      required:
        - tokens
        - user

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        bio:
          type: string
        profile_photo:
          type: string
        verified:
          type: boolean
        verified_at:
          type: string
          format: date-time
          nullable: true
        preferences:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    VerificationStatus:
      type: object
      properties:
        status:
          type: string
          enum: [none, pending, approved, rejected]
        method:
          type: string
          enum: [card, id]
        verified_at:
          type: string
          format: date-time
          nullable: true

    DiscoverProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        bio:
          type: string
        profile_photo_url:
          type: string
        verified:
          type: boolean
        distance_km:
          type: number
          format: float

    SwipeRequest:
      type: object
      required: [user_id, direction]
      properties:
        user_id:
          type: string
          format: uuid
        direction:
          type: string
          enum: [like, pass]

    SwipeResponse:
      type: object
      properties:
        matched:
          type: boolean
        match:
          $ref: "#/components/schemas/MatchWithUser"

    MatchWithUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_a_id:
          type: string
          format: uuid
        user_b_id:
          type: string
          format: uuid
        matched_at:
          type: string
          format: date-time
        unmatched_at:
          type: string
          format: date-time
          nullable: true
        other_user:
          $ref: "#/components/schemas/User"

    ConversationPreview:
      type: object
      properties:
        id:
          type: string
          format: uuid
        match_id:
          type: string
          format: uuid
        other_user:
          $ref: "#/components/schemas/User"
        last_message:
          $ref: "#/components/schemas/Message"
        unread_count:
          type: integer
        last_message_at:
          type: string
          format: date-time

    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        match_id:
          type: string
          format: uuid
        participants:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/MessageType"
        content:
          type: string
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    MessageType:
      type: string
      enum: [text, image, gif]

    SendMessageRequest:
      type: object
      required: [type, content]
      properties:
        type:
          $ref: "#/components/schemas/MessageType"
        content:
          type: string

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        body:
          type: string
        data:
          type: object
        read:
          type: boolean
        created_at:
          type: string
          format: date-time

    RegisterDeviceRequest:
      type: object
      required: [token, platform, device_id]
      properties:
        token:
          type: string
        platform:
          type: string
          enum: [ios, android, web]
        device_id:
          type: string
        app_version:
          type: string

    RegisterVoIPDeviceRequest:
      type: object
      required: [token, bundle_id]
      properties:
        token:
          type: string
        bundle_id:
          type: string

    ActiveCall:
      type: object
      properties:
        id:
          type: string
          format: uuid
        caller_id:
          type: string
          format: uuid
        callee_id:
          type: string
          format: uuid
        match_id:
          type: string
          format: uuid
        state:
          type: string
          enum: [ringing, connected, ended]
        video_enabled:
          type: boolean
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true

    HapticDevice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        device_name:
          type: string
        can_vibrate:
          type: boolean
        can_rotate:
          type: boolean
        can_linear:
          type: boolean
        max_intensity:
          type: number
          format: float
          minimum: 0
          maximum: 1
        last_connected:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    HapticDevicePublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        device_name:
          type: string
        can_vibrate:
          type: boolean
        can_rotate:
          type: boolean
        can_linear:
          type: boolean

    HapticDeviceRequest:
      type: object
      required: [device_name]
      properties:
        device_name:
          type: string
        can_vibrate:
          type: boolean
          default: true
        can_rotate:
          type: boolean
          default: false
        can_linear:
          type: boolean
          default: false
        max_intensity:
          type: number
          format: float
          default: 1.0
          minimum: 0
          maximum: 1

    HapticPermission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        controller_id:
          type: string
          format: uuid
        match_id:
          type: string
          format: uuid
        permission_type:
          type: string
        max_intensity:
          type: number
          format: float
          minimum: 0
          maximum: 1
        expires_at:
          type: string
          format: date-time
          nullable: true
        granted_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true

    SetHapticPermissionRequest:
      type: object
      required: [controller_id, match_id, permission_type, max_intensity]
      properties:
        controller_id:
          type: string
          format: uuid
        match_id:
          type: string
          format: uuid
        permission_type:
          type: string
        max_intensity:
          type: number
          format: float
          minimum: 0
          maximum: 1

    HapticCommand:
      type: object
      required: [target_user_id, match_id, intensity, duration_ms]
      properties:
        target_user_id:
          type: string
          format: uuid
        match_id:
          type: string
          format: uuid
        intensity:
          type: number
          format: float
          minimum: 0
          maximum: 1
        duration_ms:
          type: integer
          minimum: 0
          maximum: 30000
        pattern_id:
          type: string
          format: uuid

    HapticPattern:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        steps:
          type: array
          items:
            type: object
            properties:
              intensity:
                type: number
                format: float
              duration_ms:
                type: integer
        created_at:
          type: string
          format: date-time

    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        session_code:
          type: string
        host_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, ended]
        participants:
          type: array
          items:
            type: object
            properties:
              user_id:
                type: string
                format: uuid
              device_type:
                type: string
              joined_at:
                type: string
                format: date-time
        created_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true

    StoreItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        creator_id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/ItemType"
        name:
          type: string
        description:
          type: string
        price:
          type: integer
          description: Price in cents
        currency:
          type: string
          default: usd
        thumbnail_url:
          type: string
        preview_url:
          type: string
        asset_bundle:
          type: object
        tags:
          type: array
          items:
            type: string
        purchase_count:
          type: integer
        rating:
          type: number
          format: float
        is_featured:
          type: boolean
        status:
          $ref: "#/components/schemas/ItemStatus"
        created_at:
          type: string
          format: date-time

    ItemType:
      type: string
      enum: [avatar, outfit, toy, effect, gesture]

    ItemStatus:
      type: string
      enum: [draft, pending, approved, rejected, disabled]

    Purchase:
      type: object
      properties:
        id:
          type: string
          format: uuid
        buyer_id:
          type: string
          format: uuid
        item_id:
          type: string
          format: uuid
        creator_id:
          type: string
          format: uuid
        amount:
          type: integer
          description: Amount in cents
        currency:
          type: string
        stripe_payment_id:
          type: string
        status:
          type: string
          enum: [pending, completed, refunded, failed]
        created_at:
          type: string
          format: date-time

    CreatorPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        store_name:
          type: string
        description:
          type: string
        item_count:
          type: integer
        total_sales:
          type: integer

    Creator:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        store_name:
          type: string
        description:
          type: string
        stripe_account_id:
          type: string
        onboarding_complete:
          type: boolean
        item_count:
          type: integer
        total_sales:
          type: integer
        total_earnings:
          type: integer
        created_at:
          type: string
          format: date-time

    Earnings:
      type: object
      properties:
        total_earnings:
          type: integer
          description: Total earnings in cents
        pending_payout:
          type: integer
        last_payout_at:
          type: string
          format: date-time
          nullable: true
        sales_count:
          type: integer

    VerificationRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        method:
          type: string
        status:
          type: string
        submitted_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        reviewer_notes:
          type: string

    Report:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reporter_id:
          type: string
          format: uuid
        reported_user_id:
          type: string
          format: uuid
        reason:
          type: string
        details:
          type: string
        status:
          type: string
          enum: [pending, reviewed]
        created_at:
          type: string
          format: date-time

    # Profile schemas
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        bio:
          type: string
        age:
          type: integer
        photos:
          type: array
          items:
            type: string
        interests:
          type: array
          items:
            type: string
        verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    UserPublicProfile:
      type: object
