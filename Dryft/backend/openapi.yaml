      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items:
                    $ref: "#/components/schemas/AnalyticsEvent"
      responses:
        "200":
          description: Events tracked
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer

  /v1/analytics/user:
    get:
      tags: [Analytics]
      summary: Get user analytics
      operationId: getUserAnalytics
      responses:
        "200":
          description: User analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAnalytics"

  /v1/admin/analytics/overview:
    get:
      tags: [Admin]
      summary: Get analytics overview
      operationId: getAnalyticsOverview
      parameters:
        - name: start_date
