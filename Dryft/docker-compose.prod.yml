version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dryft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-drift}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-drift}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drift

  redis:
    image: redis:7-alpine
    container_name: dryft-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drift

  api:
    image: ${DRIFT_API_IMAGE:-drift-backend:latest}
    container_name: dryft-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - ../.env.prod
    environment:
      # These can be overridden by .env.prod values.
      # When using Docker Postgres (local dev), DATABASE_URL points to the container.
      # When using managed RDS (production), set DATABASE_URL in .env.prod instead.
      PORT: ${PORT:-8080}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-drift}?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    networks:
      - drift

volumes:
  postgres_data:
  redis_data:

networks:
  drift:
    driver: bridge
